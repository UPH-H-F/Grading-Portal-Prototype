<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UPHSD Grading System Prototype</title>
  
  <!-- 1. Load Tailwind CSS to apply all the colors and styling -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- 2. Tell the browser where to find React and the Icons from the internet -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.344.0"
      }
    }
  </script>

  <!-- 3. Load Babel so the browser can understand the React .jsx file format -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-[#f3f4f5]">
  
  <!-- This empty box is where your React App will be injected -->
  <div id="root"></div>

  <!-- 4. Load your App.jsx file -->
  <script type="text/babel" data-type="module" src="./App.jsx"></script>

  <!-- 5. Connect and start the App inside the "root" div -->
  <script type="text/babel" data-type="module">
    import React from 'react';
    import { createRoot } from 'react-dom/client';
    import App from './App.jsx';

    const rootElement = document.getElementById('root');
    const root = createRoot(rootElement);
    root.render(<App />);
  </script>

</body>
</html>
